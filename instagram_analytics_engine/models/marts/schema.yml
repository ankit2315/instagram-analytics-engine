version: 2

models:
  - name: fct_instagram_post_performance
    description: "Post-level Instagram performance fact table. One row per Instagram post."

    columns:
      - name: post_id
        description: "Unique Instagram post identifier. This defines the grain of the fact table."
        tests:
          - not_null
          - unique

      - name: published_at
        description: "Timestamp when the Instagram post was published."
        tests:
          - not_null

      - name: views
        description: "Total number of views received by the post."

      - name: reach
        description: "Number of unique accounts reached by the post. May be null when Instagram export data does not provide reach for a post."

      - name: likes
        description: "Number of likes received by the post."

      - name: comments
        description: "Number of comments received by the post."

      - name: shares
        description: "Number of shares received by the post."

      - name: saves
        description: "Number of saves received by the post."

      - name: follows
        description: "Number of follows attributed to the post."

      - name: total_engagements
        description: "Total engagement actions on the post: likes + comments + shares + saves."
        tests:
          - not_null

      - name: like_rate
        description: "Likes divided by reach, multiplied by 100."

      - name: comment_rate
        description: "Comments divided by reach, multiplied by 100."

      - name: share_rate
        description: "Shares divided by reach, multiplied by 100."

      - name: save_rate
        description: "Saves divided by reach, multiplied by 100. High save rate indicates content users want to revisit, making it a stronger signal of resonance than likes alone."

      - name: engagement_rate
        description: "Total engagements divided by reach, multiplied by 100. Denominator is reach rather than views because reach represents unique accounts, making posts fairly comparable."

  - name: dim_post_meta
    description: "Post-level metadata dimension. One row per Instagram post with descriptive content attributes."

    columns:
      - name: post_id
        description: "Unique Instagram post identifier. This defines the grain of the dimension."
        tests:
          - not_null
          - unique

      - name: post_type
        description: "Instagram content format, such as reel or carousel."
        tests:
          - not_null

      - name: caption
        description: "Original Instagram caption text from the export."

      - name: post_url
        description: "Public Instagram URL for the post."

      - name: duration_seconds
        description: "Video duration in seconds when available."

      - name: video_length_bucket
        description: "Video duration category derived from duration_seconds: short under 15 seconds, medium from 15 to 30 seconds, long above 30 seconds, and unknown when duration is missing."
        tests:
          - not_null
          - accepted_values:
              values: ['short', 'medium', 'long', 'unknown']

  - name: agg_instagram_video_length_performance
    description: "Aggregate mart comparing performance across video length buckets (short, medium, long). One row per video length bucket."

    columns:
      - name: video_length_bucket
        description: "The video duration category. This defines the grain of this aggregate mart."
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['short', 'medium', 'long', 'unknown']
      
      - name: video_length_sort
        description: "Integer sort column for BI tools to properly order buckets (1=short, 2=medium, 3=long)."
      
      - name: post_count
        description: "Total number of posts in this video length bucket."
        tests:
          - not_null

  - name: agg_instagram_weekly_performance
    description: "Aggregate mart showing performance trends over time. One row per week."

    columns:
      - name: week_start_date
        description: "The Monday of the week. This defines the grain of this aggregate mart."
        tests:
          - not_null
          - unique
      
      - name: post_count
        description: "Total number of posts published during this week."
        tests:
          - not_null

  - name: rpt_instagram_post_performance
    description: "Wide report table containing post performance metrics and metadata, enriched with global rankings. One row per post."

    columns:
      - name: post_id
        description: "Unique identifier for the Instagram post."
        tests:
          - not_null
          - unique

  - name: agg_instagram_overview
    description: "Executive overview mart containing lifetime performance totals. One row table."
    columns:
      - name: total_posts
        description: "Total lifetime posts."
